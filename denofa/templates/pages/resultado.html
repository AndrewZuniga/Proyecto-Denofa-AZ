{% extends 'base/_base.html' %}
{% load static %}

{% block title %}DenoFA - Resultado{% endblock %}

{% block content %}
<section class="page-canvas">
  <div class="container" style="display:flex; flex-direction:column; align-items:center;">
    <div class="card">
      
      <div class="state-panel state--active">
        <!-- ── GAUGE / VELOCÍMETRO ─────────────────── -->
        <div class="gauge-section">
          <span id="verdict-badge" class="badge badge--reliable">CONFIABLE</span>

          <div class="gauge-wrapper" aria-label="Medidor de confiabilidad" role="img">
            <svg id="gauge-svg" class="gauge-svg" viewBox="0 0 260 145" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <!-- ── Arco de fondo (pista gris completa) ── -->
              <path id="gauge-track"
                    d="M 20 130 A 110 110 0 0 1 240 130"
                    fill="none"
                    stroke="var(--color-border)"
                    stroke-width="22"
                    stroke-linecap="round"/>

              <!-- ── Segmento ROJO (0–39 → 0%–39% del arco) ── -->
              <path id="gauge-seg-disinfo"
                    d="M 20 130 A 110 110 0 0 1 240 130"
                    fill="none"
                    stroke="var(--color-disinfo)"
                    stroke-width="22"
                    stroke-linecap="round"
                    stroke-dasharray="0 346"
                    stroke-dashoffset="0"/>

              <!-- ── Segmento ÁMBAR (40–69 → 39%–69% del arco) ── -->
              <path id="gauge-seg-dubious"
                    d="M 20 130 A 110 110 0 0 1 240 130"
                    fill="none"
                    stroke="var(--color-dubious)"
                    stroke-width="22"
                    stroke-linecap="round"
                    stroke-dasharray="0 346"
                    stroke-dashoffset="0"/>

              <!-- ── Segmento VERDE (70–100 → 69%–100% del arco) ── -->
              <path id="gauge-seg-reliable"
                    d="M 20 130 A 110 110 0 0 1 240 130"
                    fill="none"
                    stroke="var(--color-reliable)"
                    stroke-width="22"
                    stroke-linecap="round"
                    stroke-dasharray="0 346"
                    stroke-dashoffset="0"/>

              <!-- ── Marcas y etiquetas de escala ── -->
              <g id="gauge-ticks" class="gauge-ticks"></g>

              <!-- ── Aguja ── -->
              <g id="gauge-needle-group" transform="translate(130,130) rotate(-90)">
                <!-- cuerpo de la aguja -->
                <line id="gauge-needle"
                      x1="0" y1="4"
                      x2="0" y2="-88"
                      stroke="#1e293b"
                      stroke-width="3"
                      stroke-linecap="round"/>
                <!-- centro circular -->
                <circle cx="0" cy="0" r="9" fill="#1e293b"/>
                <circle cx="0" cy="0" r="5" fill="#ffffff"/>
              </g>
            </svg>

            <!-- Score numérico centrado debajo de la aguja -->
            <div class="gauge-score-display">
              <span id="gauge-score-num" class="gauge-score__num">0</span>
              <span class="gauge-score__label">/ 100</span>
            </div>
          </div>
        </div>
        <!-- ── FIN GAUGE ──────────────────────────── -->

        <section aria-labelledby="why-heading">
          <h3 id="why-heading" style="font-size: 15px; margin-bottom: var(--space-sm);">¿Por qué?</h3>
          <div id="explanation-text" class="explanation-text"></div>
        </section>

        <section aria-labelledby="fragments-heading">
          <div class="fragments-header">
            <h3 id="fragments-heading" class="fragments-title">Fragmentos detectados</h3>
            <a id="btn-ver-detalle" href="/detalle/" class="fragments-link" aria-label="Ver análisis detallado">
              Ver más detalles →
            </a>
          </div>
          <div id="fragments-tags" class="fragments-tags"></div>
        </section>

        <div class="actions-row" style="margin-top: var(--space-xl);">
          <button id="btn-share" class="btn btn--outline-primary btn--icon" aria-label="Compartir resultado">
            <svg width="18" height="20" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="15" cy="3" r="2" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="15" cy="17" r="2" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="3" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 11.5l8 4M13 4.5L5 8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button id="btn-save" class="btn btn--outline-primary btn--half" style="flex:1;" aria-label="Guardar resultado">
            Guardar
          </button>
          <button id="btn-nueva-consulta" class="btn btn--primary btn--half" style="flex:1;" aria-label="Nueva consulta">
            Nueva consulta
          </button>
        </div>
      </div>

    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script type="module" src="{% static 'js/utils.js' %}"></script>
<script type="module" src="{% static 'js/resultado.js' %}"></script>
{% endblock %}
