{% extends 'base/_base.html' %}
{% load static %}

{% block title %}DenoFA - Resultado{% endblock %}

{% block content %}
<section class="page-canvas">
  <div class="container" style="display:flex; flex-direction:column; align-items:center;">
    <div class="card">
      
      <div class="state-panel state--active">
        <!-- ── GAUGE / VELOCÍMETRO ─────────────────── -->
        <div class="gauge-section">
          <span id="verdict-badge" class="badge badge--reliable">CONFIABLE</span>

          <div class="gauge-wrapper" aria-label="Medidor de confiabilidad" role="img">
            <svg id="gauge-svg" class="gauge-svg" viewBox="0 0 260 145" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <mask id="gauge-mask">
                  <path id="gauge-mask-arc" d="M 20 130 A 110 110 0 0 1 240 130" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-dasharray="0 346" stroke-dashoffset="0"/>
                </mask>
              </defs>
              <!-- ── Arco de fondo (pista gris completa) ── -->
              <path id="gauge-track"
                    d="M 20 130 A 110 110 0 0 1 240 130"
                    fill="none"
                    stroke="var(--color-border)"
                    stroke-width="22"
                    stroke-linecap="round"/>

              <g mask="url(#gauge-mask)">
                <!-- ── Segmento ROJO (0–39 → 0%–39% del arco) ── -->
                <path id="gauge-seg-disinfo"
                      d="M 20 130 A 110 110 0 0 1 240 130"
                      fill="none"
                      stroke="var(--color-disinfo)"
                      stroke-width="22"
                      stroke-linecap="round"
                      stroke-dasharray="134.78 346"
                      stroke-dashoffset="0"/>

                <!-- ── Segmento ÁMBAR (40–69 → 39%–69% del arco) ── -->
                <path id="gauge-seg-dubious"
                      d="M 20 130 A 110 110 0 0 1 240 130"
                      fill="none"
                      stroke="var(--color-dubious)"
                      stroke-width="22"
                      stroke-linecap="round"
                      stroke-dasharray="103.68 346"
                      stroke-dashoffset="-134.78"/>

                <!-- ── Segmento VERDE (70–100 → 69%–100% del arco) ── -->
                <path id="gauge-seg-reliable"
                      d="M 20 130 A 110 110 0 0 1 240 130"
                      fill="none"
                      stroke="var(--color-reliable)"
                      stroke-width="22"
                      stroke-linecap="round"
                      stroke-dasharray="107.14 346"
                      stroke-dashoffset="-238.46"/>
              </g>

              <!-- ── Marcas y etiquetas de escala ── -->
              <g id="gauge-ticks" class="gauge-ticks"></g>

              <g id="gauge-needle-group" transform="rotate(0 130 130)">
                <circle cx="20" cy="130" r="10" fill="#ffffff" stroke="#1e293b" stroke-width="4"/>
              </g>
            </svg>

            <!-- Score numérico centrado debajo de la aguja -->
            <div class="gauge-score-display">
              <span id="gauge-score-num" class="gauge-score__num gauge-score__num--idle">0</span>
              <span class="gauge-score__label">%</span>
            </div>
          </div>
        </div>
        <!-- ── FIN GAUGE ──────────────────────────── -->

        <section aria-labelledby="why-heading">
          <h3 id="why-heading" style="font-size: 15px; margin-bottom: var(--space-sm);">¿Por qué?</h3>
          <div id="explanation-text" class="explanation-text"></div>
        </section>

        <section aria-labelledby="fragments-heading">
          <div class="fragments-header">
            <h3 id="fragments-heading" class="fragments-title">Análisis de fragmentos</h3>
          </div>
          <div id="fragments-tags" class="fragments-tags" style="display: flex; flex-direction: column; gap: var(--space-xs);"></div>
        </section>

        <div class="actions-column" style="margin-top: var(--space-xl); display: flex; flex-direction: column; gap: var(--space-sm); width: 100%;">
          <a id="btn-ver-detalle" href="/detalle/" class="btn btn--primary" style="width: 100%; text-align: center; text-decoration: none;" aria-label="Ver análisis detallado">
            Ver más detalles
          </a>
          
          <div class="actions-row" style="display: flex; gap: var(--space-sm);">
            <button id="btn-nueva-consulta" class="btn btn--outline" style="flex:1;" aria-label="Nueva consulta">
              Nueva consulta
            </button>
            <button id="btn-share" class="btn btn--ghost" aria-label="Compartir resultado" style="display:flex; align-items:center; gap:8px; padding: 0 var(--space-sm);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"/>
                <circle cx="6" cy="12" r="3"/>
                <circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
              </svg>
              <span style="font-size: 14px; font-weight: 500;">Compartir</span>
            </button>
            <button id="btn-save" class="btn btn--ghost" aria-label="Guardar resultado" style="display:flex; align-items:center; gap:8px; padding: 0 var(--space-sm);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              <span style="font-size: 14px; font-weight: 500;">Guardar</span>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script type="module" src="{% static 'js/utils.js' %}?v=14"></script>
<script type="module" src="{% static 'js/resultado.js' %}?v=14"></script>
{% endblock %}
